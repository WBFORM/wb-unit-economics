<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Калькулятор упаковки WB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 24px;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
      font-weight: 500;
    }
    input, select, button {
      font-size: 14px;
      padding: 8px 10px;
      border-radius: 4px;
      border: 1px solid #ccc;
      width: 100%;
      box-sizing: border-box;
    }
    button {
      width: auto;
      cursor: pointer;
      background: #4f46e5;
      color: #fff;
      border-color: #4f46e5;
    }
    button:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .row {
      display: flex;
      gap: 12px;
    }
    .row .field {
      flex: 1;
    }
    .hint {
      font-size: 12px;
      color: #666;
    }
    .status {
      margin-top: 8px;
      font-size: 13px;
    }
    .status.error {
      color: #b91c1c;
    }
    .status.success {
      color: #15803d;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Калькулятор упаковки для WB</h1>

    <!-- Ссылка на товар WB -->
    <div class="field">
      <label for="productUrl">Ссылка на товар Wildberries</label>
      <input id="productUrl" type="text" placeholder="https://www.wildberries.ru/catalog/208285191/detail.aspx" />
      <div class="hint">Вставьте ссылку на товар с сайта WB и нажмите кнопку ниже.</div>
    </div>

    <div class="field">
      <button type="button" id="btnWbAutofill">Подтянуть данные с WB</button>
      <div id="wbStatus" class="status"></div>
    </div>

    <hr />

    <!-- Габариты -->
    <div class="row">
      <div class="field">
        <label for="lengthCm">Длина, см</label>
        <input id="lengthCm" type="number" step="0.1" />
      </div>
      <div class="field">
        <label for="widthCm">Ширина, см</label>
        <input id="widthCm" type="number" step="0.1" />
      </div>
      <div class="field">
        <label for="heightCm">Высота, см</label>
        <input id="heightCm" type="number" step="0.1" />
      </div>
    </div>

    <!-- Категория -->
    <div class="row">
      <div class="field">
        <label for="parentCategory">Родительская категория</label>
        <input id="parentCategory" type="text" />
      </div>
      <div class="field">
        <label for="category">Категория</label>
        <input id="category" type="text" />
      </div>
    </div>

    <div class="field">
      <div class="hint">
        Ниже можешь оставить свой старый функционал калькулятора (расчёты по категориям / ГТД и т.п.).
      </div>
    </div>
  </div>

  <script>
    let categoriesCache = null;
    let categoriesLoaded = false;

    document.getElementById('btnWbAutofill').addEventListener('click', autofillFromWbUrl);

    async function autofillFromWbUrl() {
      const statusEl = document.getElementById('wbStatus');
      const btn = document.getElementById('btnWbAutofill');
      const urlInput = document.getElementById('productUrl');
      const wbUrl = urlInput.value.trim();

      statusEl.textContent = '';
      statusEl.className = 'status';

      if (!wbUrl) {
        statusEl.textContent = 'Введите ссылку на товар WB.';
        statusEl.classList.add('error');
        return;
      }

      btn.disabled = true;
      statusEl.textContent = 'Получаем данные с WB...';

      try {
        const resp = await fetch(`/api/wb-card?url=${encodeURIComponent(wbUrl)}`);
        const data = await resp.json();

        if (!resp.ok) {
          console.error('API error', data);
          statusEl.textContent = data.error || 'Не удалось подтянуть данные с WB.';
          statusEl.classList.add('error');
          return;
        }

        // Заполняем габариты, если есть
        if (data.lengthCm) document.getElementById('lengthCm').value = data.lengthCm;
        if (data.widthCm) document.getElementById('widthCm').value = data.widthCm;
        if (data.heightCm) document.getElementById('heightCm').value = data.heightCm;

        // Пытаемся подобрать категорию
        if (data.subjectName) {
          await autofillCategoryBySubject(data.subjectName);
        }

        statusEl.textContent = `Данные подгружены. Артикул: ${data.nmId}${data.subjectName ? ', категория WB: ' + data.subjectName : ''}`;
        statusEl.classList.add('success');
      } catch (e) {
        console.error(e);
        statusEl.textContent = 'Ошибка при обращении к API.';
        statusEl.classList.add('error');
      } finally {
        btn.disabled = false;
      }
    }

    async function loadCategoriesOnce() {
      if (categoriesLoaded) return;
      try {
        const resp = await fetch('/categories.json');
        if (!resp.ok) {
          console.warn('Не удалось загрузить categories.json');
          categoriesLoaded = true;
          categoriesCache = [];
          return;
        }
        categoriesCache = await resp.json();
        categoriesLoaded = true;
      } catch (e) {
        console.error('Ошибка загрузки categories.json', e);
        categoriesLoaded = true;
        categoriesCache = [];
      }
    }

    async function autofillCategoryBySubject(subjectName) {
      await loadCategoriesOnce();
      if (!categoriesCache || categoriesCache.length === 0) return;

      const lower = subjectName.toLowerCase();

      // Простой поиск по точному совпадению wbSubject/subjectName в categories.json
      let found = categoriesCache.find(c => {
        if (c.wbSubject) return String(c.wbSubject).toLowerCase() === lower;
        if (c.subjectName) return String(c.subjectName).toLowerCase() === lower;
        return false;
      });

      // Если нет точного совпадения — пробуем по вхождению
      if (!found) {
        found = categoriesCache.find(c => {
          const name = (c.wbSubject || c.subjectName || c.name || '').toLowerCase();
          return name && lower.includes(name);
        });
      }

      if (found) {
        if (found.parent) {
          document.getElementById('parentCategory').value = found.parent;
        }
        if (found.name) {
          document.getElementById('category').value = found.name;
        }
      }
    }
  </script>
</body>
</html>
